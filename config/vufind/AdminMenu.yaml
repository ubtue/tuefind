# This file configures the AdminMenu section plugin, which renders the admin menu.
# If this file is empty or missing, default settings will be used, matching
# the examples provided below.
#
# The format of this configuration is as follows:
#
# Array keys for every menu item could be:
#   - name: name of an item, used to add an 'active' CSS class on the menu item's
#     <a> tag when the name matches the page template name
#   - label: the text shown as link, will be translated - required
#   - route: route name used to generate link target - required
#   - icon: icon used for the item, has to be defined in theme config
#   - iconMethod: method to dynamically create the icon name; ignored when
#     icon is explicitly set.
#   - checkMethod: the name of an AdminMenu section plugin method to perform
#     a check whether to show the item. If omitted, item will always display.
#   - status: whether to show status label, defaults to false
#
# You can use checkMethod: alwaysFail to disable specific inherited groups or items
# in local configuration. If you wish to completely override the default
# configuration you can disable configuration inheritance by adding a
# "@parent_yaml": false entry at the very top of your local configuration file.

Admin:
  MenuItems:
    - name: home
      label: Home
      route: admin

    - name: socialstats
      label: Social Statistics
      route: admin/social

    - name: config
      label: Configuration
      route: admin/config

    - name: maintenance
      label: System Maintenance
      route: admin/maintenance

    - name: tags
      label: Tag Maintenance
      route: admin/tags

    - name: feedback
      label: Feedback Management
      route: admin/feedback

    - name: overdrive
      label: od_admin_menu
      route: admin/overdrive
      checkMethod: checkShowOverdrive

    - name: payment
      label: Online Payment
      route: admin/payment
